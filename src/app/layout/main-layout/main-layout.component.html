<div class="flex h-screen bg-gray-50">
  <div class="flex-1 flex flex-col">
    
    <main class="flex-1 p-6 overflow-auto relative">
      <!-- User Settings Button -->
      <div class="absolute top-4 right-4">
        <button class="opacity-50 hover:opacity-100 transition-opacity duration-200"
                (click)="toggleUserMenu()">
          <span class="material-icons text-2xl">account_circle</span>
        </button>
        
        @if (showUserMenu) {
          <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 z-50"
               tabindex="0"
               (blur)="toggleUserMenu()"
               (keydown.escape)="toggleUserMenu()">
            <a
              (click)="toggleUserMenu()"
              routerLink="/settings" 
              class="block px-4 py-2 text-gray-800 hover:bg-gray-100">
              General Settings
            </a>
            <button (click)="logout()" class="w-full text-left px-4 py-2 text-gray-800 hover:bg-gray-100">
              Logout
            </button>
          </div>
        }
      </div>

      <router-outlet></router-outlet>
      <!-- Navigation -->
      <app-navigation></app-navigation>
      <!-- Main Content -->
    </main>
  </div>

  <!-- Tooltip -->
  @if (showTooltip) {
    <div class="fixed bg-gray-900 text-white px-3 py-2 rounded-lg text-sm z-50 shadow-lg transform transition-all duration-200"
         [style.left.px]="tooltipPosition.x"
         [style.top.px]="tooltipPosition.y">
      {{ tooltipText }}
    </div>
  }
</div>
